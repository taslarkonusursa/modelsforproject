<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #222; }
      #status {
        position: fixed; top: 10px; left: 10px; right: 10px;
        background: rgba(0,0,0,0.8); color: #fff;
        padding: 8px 12px; border-radius: 8px;
        font-size: 14px; font-family: monospace;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="status">Model yükleniyor...</div>

    <a-scene background="color: #222">
      <a-assets timeout="15000">
        <a-asset-item
          id="umay-model"
          src="https://taslarkonusursa.github.io/modelsforproject/umayanarenkli-v2.glb">
        </a-asset-item>
      </a-assets>

      <a-light type="ambient" intensity="2"></a-light>
      <a-light type="directional" position="0 5 5" intensity="2"></a-light>

      <!-- Model tam kameranın önünde -->
      <a-gltf-model
        id="test-model"
        src="#umay-model"
        position="0 0 -2"
        scale="1 1 1"
        rotation="0 0 0">
      </a-gltf-model>

      <a-camera position="0 0 0"></a-camera>
    </a-scene>

    <script>
      const model = document.getElementById('test-model');
      const status = document.getElementById('status');

      model.addEventListener('model-loaded', (e) => {
        const mesh = model.getObject3D('mesh');
        if (mesh) {
          const box = new THREE.Box3().setFromObject(mesh);
          const size = box.getSize(new THREE.Vector3());
          status.textContent = 'Model yüklendi! Boyut: x=' + size.x.toFixed(2) + ' y=' + size.y.toFixed(2) + ' z=' + size.z.toFixed(2);
          status.style.background = 'rgba(0,100,0,0.8)';
        }
      });

      model.addEventListener('model-error', (e) => {
        status.textContent = 'Model yüklenemedi: ' + JSON.stringify(e.detail);
        status.style.background = 'rgba(150,0,0,0.8)';
      });
    </script>
  </body>
</html>
