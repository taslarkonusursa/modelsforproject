<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; }
      #status {
        position: fixed; top: 10px; left: 10px; right: 10px;
        background: rgba(0,0,0,0.7); color: #fff;
        padding: 8px 12px; border-radius: 8px;
        font-size: 13px; font-family: monospace;
        z-index: 9999; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="status">Yükleniyor...</div>

    <a-scene
      mindar-image="imageTargetSrc: https://taslarkonusursa.github.io/modelsforproject/targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights: true"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets timeout="15000">
        <a-asset-item
          id="umay-model"
          src="https://taslarkonusursa.github.io/modelsforproject/umayanarenkli-v2.glb"
          onload="log('GLB yüklendi ✅')"
          onerror="log('GLB yüklenemedi ❌')">
        </a-asset-item>
      </a-assets>

      <a-light type="ambient" color="#ffffff" intensity="1"></a-light>
      <a-light type="directional" color="#ffe8c0" intensity="1.5" position="1 2 1"></a-light>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
        <a-gltf-model
          src="#umay-model"
          position="0 0 0"
          scale="1 1 1"
          rotation="0 0 0">
        </a-gltf-model>
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function log(msg) {
        document.getElementById('status').textContent = msg;
        console.log(msg);
      }

      document.querySelector('a-scene').addEventListener('loaded', () => log('Sahne hazır — kartı kameraya göster'));
      document.querySelector('a-scene').addEventListener('arReady', () => log('MindAR hazır ✅'));
      document.querySelector('a-scene').addEventListener('arError', (e) => log('MindAR hata: ' + JSON.stringify(e.detail)));
      document.querySelector('[mindar-image-target]').addEventListener('targetFound', () => log('Marker bulundu ✅'));
      document.querySelector('[mindar-image-target]').addEventListener('targetLost', () => log('Marker kayboldu'));
    </script>
  </body>
</html>
