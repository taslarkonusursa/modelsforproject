<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; }
      #loading {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: #000;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 99999; color: #fff; font-family: monospace;
      }
      #loading-text { font-size: 16px; margin-top: 10px; }
      #status {
        position: fixed; top: 10px; left: 10px; right: 10px;
        background: rgba(0,0,0,0.7); color: #fff;
        padding: 8px 12px; border-radius: 8px;
        font-size: 13px; font-family: monospace;
        z-index: 9999; pointer-events: none;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div style="font-size:18px;">Türk Mitolojisi AR</div>
      <div id="loading-text">Yükleniyor...</div>
    </div>
    <div id="status"></div>

    <a-scene
      embedded
      mindar-image="imageTargetSrc: https://taslarkonusursa.github.io/modelsforproject/targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="width:100%;height:100%;">

      <a-assets timeout="300000">
        <a-asset-item id="umayana" src="https://taslarkonusursa.github.io/modelsforproject/umayanarenkli.glb"></a-asset-item>
        <a-asset-item id="arcura" src="https://taslarkonusursa.github.io/modelsforproject/arcura.glb"></a-asset-item>
        <a-asset-item id="saman" src="https://taslarkonusursa.github.io/modelsforproject/saman.glb"></a-asset-item>
        <a-asset-item id="erlik" src="https://taslarkonusursa.github.io/modelsforproject/erlik.glb"></a-asset-item>
        <a-asset-item id="kayrahan" src="https://taslarkonusursa.github.io/modelsforproject/kayrahan.glb"></a-asset-item>
        <a-asset-item id="ulgen" src="https://taslarkonusursa.github.io/modelsforproject/ulgen.glb"></a-asset-item>
        <a-asset-item id="suiyesi" src="https://taslarkonusursa.github.io/modelsforproject/suiyesi.glb"></a-asset-item>
        <a-asset-item id="yelbegen" src="https://taslarkonusursa.github.io/modelsforproject/yelbegen.glb"></a-asset-item>
        <a-asset-item id="alkarisi" src="https://taslarkonusursa.github.io/modelsforproject/alkarisi.glb"></a-asset-item>
        <a-asset-item id="mergen" src="https://taslarkonusursa.github.io/modelsforproject/mergen.glb"></a-asset-item>
        <a-asset-item id="tulpar" src="https://taslarkonusursa.github.io/modelsforproject/tulpar.glb"></a-asset-item>
        <a-asset-item id="tepegoz" src="https://taslarkonusursa.github.io/modelsforproject/tepegoz.glb"></a-asset-item>
      </a-assets>

      <a-light type="ambient" color="#ffffff" intensity="2"></a-light>
      <a-light type="directional" color="#ffffff" intensity="2" position="0 5 5"></a-light>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#umayana" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model src="#arcura" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model src="#saman" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-gltf-model src="#erlik" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 4">
        <a-gltf-model src="#kayrahan" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 5">
        <a-gltf-model src="#ulgen" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 6">
        <a-gltf-model src="#suiyesi" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 7">
        <a-gltf-model src="#yelbegen" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 8">
        <a-gltf-model src="#alkarisi" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 9">
        <a-gltf-model src="#mergen" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 10">
        <a-gltf-model src="#tulpar" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 11">
        <a-gltf-model src="#tepegoz" position="0 0 0" scale="0.8 0.8 0.8" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function log(msg) {
        const s = document.getElementById('status');
        s.style.display = 'block';
        s.textContent = msg;
      }

      document.querySelector('a-scene').addEventListener('loaded', () => {
        document.getElementById('loading').style.display = 'none';
        log('Hazır — kartı kameraya göster');
      });

      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
      }, 30000);

      document.querySelector('a-scene').addEventListener('arReady', () => log('MindAR hazır'));
      document.querySelector('a-scene').addEventListener('arError', (e) => log('Hata: ' + JSON.stringify(e.detail)));

      document.querySelectorAll('[mindar-image-target]').forEach((el, i) => {
        el.addEventListener('targetFound', () => log(i + '. marker bulundu!'));
        el.addEventListener('targetLost', () => log('Marker kayboldu'));
      });
    </script>
  </body>
</html>
