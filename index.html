<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umay Ana AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        button {
            padding: 20px 40px; font-size: 20px; background: #27ae60;
            color: white; border: none; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h2>Umay Ana AR Deneyimi</h2>
        <button id="start-btn">BAŞLAT</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no;" 
             embedded renderer="colorManagement: true, alpha: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="umayModel" src="./umayanarenkli-v2.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#umayModel" rotation="0 0 0" position="0 0 0.1" scale="0.3 0.3 0.3"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const sceneEl = document.querySelector('a-scene');

        btn.addEventListener('click', () => {
            overlay.style.display = "none";
            sceneEl.systems['mindar-image-system'].start();
        });
    </script>
</body>
</html>
